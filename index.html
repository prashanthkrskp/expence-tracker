<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.css">
    <title>Expence-tracker</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="images/save-money.png" alt="logo" width="50px">
                Expence-tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link " href="#">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container p-5">
        <div class="mb-3 ">
            <button type="button" class="btn btn-outline-primary float-end" onclick="showExpenceModal()">
                Add Expence
            </button>
            <div class="p-10">
                <label class="mt-3 text-success"><b>Total Spent :</b></label>
                <b>1500</b>
            </div>
        </div>
        <div class="d-flex justify-content-center">
            <div class="col-sm-12 col-md-12 col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-bordered">
                            <thead class="text-center">
                                <th>#</th>
                                <th>Description</th>
                                <th>date</th>
                                <th>Spent Amount</th>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addExpenceModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="addExpenceModal" aria-hidden="true">
        <form action="" id="addExpenceForm">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header>
                        <h5 class="modal-title " id="addExpenceModalLabel">
                            Add Expence
                        </h5>
                        <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-1">
                            <label for="addExpenceDescription" class="form-label">Description</label>
                            <textarea name="addExpenceDescription" class="form-control" id="addExpenceDescription" rows="3" placeholder="Add your expence description"></textarea>
                        </div>
                        <div class="mb-1">
                            <label for="addExpenceExpenditureDate" class="form-label">Expenditure Date</label>
                            <input type="date" name="addExpenceExpenditureDate" class="form-control" id="addExpenceExpenditureDate" placeholder="Add your Spent Amount" >
                        </div>
                        <div class="mb-1">
                            <label for="addExpenceDescription" class="form-label">Description</label>
                            <textarea name="addExpenceDescription" class="form-control" id="addExpenceDescription" rows="3" placeholder="Add your expence description"></textarea>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">cancel</button>
                            <button type="button" class="btn btn-primary" onclick="saveExpence()">Add Expence</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/popperjs/popper.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.js"></script>
    <script>
        function showExpenceModal(){
            $("#addExpenceModal").modal('show')
        }
        function saveExpence(){
            $("#addExpenceModal").modal('hide')
        }
    </script>
</body>
</html>
